# -*- vim: ft=yaml:sw=2 -*-
name: Test

on:
  - push
  - pull_request
  - workflow_dispatch

env:
  PY_COLORS: "1"
  FORCE_COLOR: true

jobs:
  Test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - salt: "3007"
            python: "3.10"
            pebble: latest
          - salt: "3006"
            python: "3.10"
            pebble: latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: True

      - run: docker compose --file test/docker-compose.yml up --detach
        env:
          PEBBLE_VERSION: ${{ matrix.pebble }}

      - run: uv sync --dev
      - run: uv run nox --session 'test(salt=${{ matrix.salt }})' -- -vv

  ruff-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: True

      - run: uv sync --only-group=lint
      - run: uv run ruff check --no-fix --diff

  ruff-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: True

      - run: uv sync --only-group=lint
      - run: uv run ruff format --diff --check
