# -*- vim: ft=yaml:sw=2 -*-
name: Test

on:
  - push
  - pull_request
  - workflow_dispatch

env:
  PY_COLORS: "1"
  FORCE_COLOR: true

jobs:
  Test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - salt: "3007"
            python: "3.10"
          - salt: "3006"
            python: "3.10"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: True

      - run: docker compose up --detach
        env:
          # Enable sleeping in Pebble to ensure that the tests properly
          # wait for the expected state instead of racing ahead.
          PEBBLE_VA_NOSLEEP: "0"

      - run: uv sync --dev
      - run: uv run nox --session 'test(salt=${{ matrix.salt }})' -- -vv

  ruff-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: True

      - run: uv sync --only-group=lint
      - run: uv run ruff check --no-fix --diff

  ruff-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: True

      - run: uv sync --only-group=lint
      - run: uv run ruff format --diff --check
